name: Core SDK Publisher Pipeline

on:
  push:
    tags:
      - "core/v*" # Trigger ONLY on Core SDK version tags

permissions:
  contents: write

jobs:
  build-and-release:
    name: Package & Release Core SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Extract Tag Name
        run: |
          REF=$(jq -r '.ref' "$GITHUB_EVENT_PATH")
          TAG_NAME=${REF#refs/tags/}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          
          # Remove 'core/v' prefix for the zip filename
          RAW_VERSION=${TAG_NAME#core/v}
          echo "RAW_VERSION=$RAW_VERSION" >> $GITHUB_ENV

      - name: Install ZIP
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Create Core SDK Archive
        run: |
          echo ">>> Packaging Core SDK v${RAW_VERSION}..."
          ZIP_NAME="toob-core-v${RAW_VERSION}.zip"
          
          # Zip only the necessary C-Code directories
          zip -r "$ZIP_NAME" toobloader/ sdk/ common/ cmake/
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo ">>> Created $ZIP_NAME"

      - name: Upload to Target Release Repository
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN || github.token }}
          tag_name: ${{ env.TAG_NAME }}
          draft: true
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          append_body: true
          files: |
            ${{ env.ZIP_NAME }}
