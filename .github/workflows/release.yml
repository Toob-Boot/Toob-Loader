name: Secure Publisher Pipeline

on:
  push:
    tags:
      - "v*" # Trigger ONLY on version tags, mitigating PR malware injection

permissions:
  contents: read # Least privilege by default

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest # Act runs this locally in a container
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set GitHub Status (Pending)
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.RELEASE_TARGET_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -d '{"state":"pending","description":"CLI compilation and UPX compression in progress...","context":"Publisher Daemon"}'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2" # Ensure hermetic go version
          cache: true

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Hermetic Cross-Compilation (Sequential)
        working-directory: cli/toob-cli
        run: |
          # Sequential build to prevent 4x Container OOM on bare-metal servers
          TARGETS="windows/amd64/.exe linux/amd64/ darwin/amd64/ darwin/arm64/"

          for TARGET in $TARGETS; do
            OS=$(echo $TARGET | cut -d/ -f1)
            ARCH=$(echo $TARGET | cut -d/ -f2)
            EXT=$(echo $TARGET | cut -d/ -f3)
            
            echo ">>> Building $OS-$ARCH..."
            # Use -mod=readonly to prevent fetching compromised dependencies during build
            GOOS=$OS GOARCH=$ARCH go build -mod=readonly -ldflags="-s -w -X github.com/toob-boot/toob/cmd.Version=${GITHUB_REF_NAME#v}" -o "toob-$OS-$ARCH$EXT" .
            
            # UPX Compression (Gap 4)
            if [ "$OS" != "darwin" ] || [ "$ARCH" != "arm64" ]; then
                echo ">>> Compressing with UPX..."
                upx --best "toob-$OS-$ARCH$EXT"
            fi
            
            # Signatures
            sha256sum "toob-$OS-$ARCH$EXT" > "toob-$OS-$ARCH$EXT.sha256"
          done

      - name: Upload to Target Release Repository (Draft)
        uses: softprops/action-gh-release@v2
        with:
          repository: Toob-Boot/Toob-CLI-Release
          token: ${{ secrets.RELEASE_TARGET_TOKEN }} # Highly scoped PAT for the target repo
          tag_name: ${{ github.ref_name }}
          draft: true       # Gap 2: Human-in-the-Loop Validation
          prerelease: false
          files: |
            cli/toob-cli/toob-*

      - name: Set GitHub Status (Success)
        if: success()
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.RELEASE_TARGET_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -d '{"state":"success","description":"Build and upload finished successfully!","context":"Publisher Daemon"}'

      - name: Set GitHub Status (Failure)
        if: failure()
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.RELEASE_TARGET_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -d '{"state":"error","description":"Publisher Daemon encountered a fatal error.","context":"Publisher Daemon"}'
