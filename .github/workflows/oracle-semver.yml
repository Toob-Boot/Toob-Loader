name: ABI Oracle (SemVer Auto-Tagger)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  abi-oracle:
    name: Calculate ABI and Bump Version
    runs-on: ubuntu-latest
    steps:
      - name: Setup Toob Ecosystem
        uses: ./.github/actions/setup-cli

      - name: Install ABI Tools
        run: sudo apt-get update && sudo apt-get install -y abigail-tools gcc jq

      - name: Detect Monorepo Changes
        id: changes
        run: |
          echo ">>> Detecting changes in recent commit..."

          # Check which paths were modified in the latest commit
          # Fetch all history and tags so git describe works
          git fetch --prune --unshallow || git fetch --all || true
          
          LAST_TAG=$(git describe --tags --match "core/v*" --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            # No tag found, assume everything changed
            MODIFIED_FILES=$(git ls-files)
          else
            MODIFIED_FILES=$(git diff --name-only $LAST_TAG HEAD || echo "")
          fi

          CHECK_CORE="false"
          CHECK_CHIPS="false"
          CHECK_ARCH="false"
          CHECK_VENDORS="false"

          for file in $MODIFIED_FILES; do
            if [[ "$file" == toobloader/core/* ]] || [[ "$file" == sdk/* ]] || [[ "$file" == common/* ]]; then
              CHECK_CORE="true"
            elif [[ "$file" == toob-registry/chips/* ]]; then
              CHECK_CHIPS="true"
            elif [[ "$file" == toob-registry/arch/* ]]; then
              CHECK_ARCH="true"
            elif [[ "$file" == toob-registry/vendors/* ]]; then
              CHECK_VENDORS="true"
            fi
          done

          echo "CHECK_CORE=$CHECK_CORE" >> $GITHUB_ENV
          echo "CHECK_CHIPS=$CHECK_CHIPS" >> $GITHUB_ENV
          echo "CHECK_ARCH=$CHECK_ARCH" >> $GITHUB_ENV
          echo "CHECK_VENDORS=$CHECK_VENDORS" >> $GITHUB_ENV

          echo "Core changed: $CHECK_CORE"
          echo "Chips changed: $CHECK_CHIPS"
          echo "Arch changed: $CHECK_ARCH"
          echo "Vendors changed: $CHECK_VENDORS"



      - name: ⚙️ ABI Orakel (Core SDK)
        if: env.CHECK_CORE == 'true'
        run: |
          echo ">>> [Core Oracle] Starting ABI analysis for Core, SDK, and Common..."

          # 2. Find last tag
          LAST_TAG=$(git describe --tags --match "core/v*" --abbrev=0 2>/dev/null || echo "core/v0.0.0")
          echo "Last tag was $LAST_TAG"

          RAW_VERSION=${LAST_TAG#core/v}
          MAJOR=$(echo $RAW_VERSION | cut -d. -f1)
          MINOR=$(echo $RAW_VERSION | cut -d. -f2)
          PATCH=$(echo $RAW_VERSION | cut -d. -f3)

          mkdir -p abi_workspace/current
          mkdir -p abi_workspace/old

          # 3. Build CURRENT Code
          echo ">>> Building CURRENT Code with toob CLI..."
          # Running with a generic template manifest to ensure generated_boot_config.h exists
          ./toob.exe build --manifest toob-registry/chips/esp32c6/template_device.toml

          # Extract only the Core/SDK/Common static libraries (Isolating them from the HAL)
          find builds/ -name "libtoob_core.a" -exec cp {} abi_workspace/current/ \;
          find builds/ -name "libtoob_libtoob.a" -exec cp {} abi_workspace/current/ \;
          find builds/ -name "libtoob_zcbor.a" -exec cp {} abi_workspace/current/ \;
          find builds/ -name "libtoob_heatshrink.a" -exec cp {} abi_workspace/current/ \;

          # Clean build directory so we don't mix up files
          rm -rf builds/

          # 4. Build OLD Code
          echo ">>> Cloning and building OLD Code from $LAST_TAG..."
          git clone . abi_workspace/old_repo
          cd abi_workspace/old_repo

          if [ "$LAST_TAG" != "core/v0.0.0" ]; then
              git checkout $LAST_TAG
              # Only init the registry to avoid private submodule clone errors
              git submodule update --init toob-registry
          fi

          # Build the old code using the current toob CLI executable
          ../../toob.exe build --manifest toob-registry/chips/esp32c6/template_device.toml || true

          find builds/ -name "libtoob_core.a" -exec cp {} ../old/ \; || touch ../old/libtoob_core.a
          find builds/ -name "libtoob_libtoob.a" -exec cp {} ../old/ \; || touch ../old/libtoob_libtoob.a
          find builds/ -name "libtoob_zcbor.a" -exec cp {} ../old/ \; || touch ../old/libtoob_zcbor.a
          find builds/ -name "libtoob_heatshrink.a" -exec cp {} ../old/ \; || touch ../old/libtoob_heatshrink.a

          cd ../../

          # 5. Run ABIDIFF on all core libraries
          echo ">>> Running abidiff on Core, SDK, and Common libraries..."
          ABI_EXIT_CODE=0

          set +e
          for lib in libtoob_core.a libtoob_libtoob.a libtoob_zcbor.a libtoob_heatshrink.a; do
              if [ -f "abi_workspace/current/$lib" ] && [ -f "abi_workspace/old/$lib" ]; then
                  echo ">> Analyzing $lib..."
                  abidiff abi_workspace/old/$lib abi_workspace/current/$lib
                  LIB_EXIT=$?
                  ABI_EXIT_CODE=$((ABI_EXIT_CODE | LIB_EXIT))
                  echo ">> $lib exit code: $LIB_EXIT"
              else
                  echo ">> Skipping $lib (not found in either old or current)"
              fi
          done
          set -e

          echo "Combined abidiff Exit Code: $ABI_EXIT_CODE"

          # 6. Calculate SemVer via Bitmask
          if [ $((ABI_EXIT_CODE & 1)) -ne 0 ] || [ $((ABI_EXIT_CODE & 2)) -ne 0 ]; then
              echo ">>> [FATAL] abidiff encountered an internal error. Aborting."
              exit 1
          fi

          if [ $((ABI_EXIT_CODE & 8)) -ne 0 ]; then
              echo ">>> [RESULT] Incompatible ABI changes detected (MAJOR)."
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
          elif [ $((ABI_EXIT_CODE & 4)) -ne 0 ]; then
              echo ">>> [RESULT] Compatible ABI changes detected (MINOR)."
              MINOR=$((MINOR + 1))
              PATCH=0
          else
              echo ">>> [RESULT] No ABI changes detected. Only internal logic modified (PATCH)."
              PATCH=$((PATCH + 1))
          fi

          NEW_TAG="core/v${MAJOR}.${MINOR}.${PATCH}"
          echo ">>> [Orakel] Calculated new Core version: $NEW_TAG"

          # 7. Push Tag
          git config user.name "Toob ABI Oracle"
          git config user.email "oracle@toob-boot.io"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo ">>> [Orakel] Core Tag $NEW_TAG successfully pushed!"

      - name: ABI Orakel (Chips)
        if: env.CHECK_CHIPS == 'true'
        run: |
          echo ">>> [Chips Oracle] Changes in chips/ detected."
          # TODO: Implement multi-chip detection
          # 1. Identify which specific chip folders changed (e.g., toob-registry/chips/esp32c6)
          # 2. Extract LAST_TAG for that specific chip (e.g., chip-esp32c6/v1.0.0)
          # 3. gcc -c -g on the chip's HAL mapping files
          # 4. abidiff bitmask logic
          # 5. Push new tag (e.g., chip-esp32c6/v1.1.0)
          echo "Chips SemVer logic placeholder reached."

      - name: ABI Orakel (Architectures)
        if: env.CHECK_ARCH == 'true'
        run: |
          echo ">>> [Arch Oracle] Changes in arch/ detected."
          # TODO: Implement multi-arch detection
          # Logic identical to Chips Oracle. Tags: arch-riscv32/v1.0.0
          echo "Arch SemVer logic placeholder reached."

      - name: ABI Orakel (Vendors)
        if: env.CHECK_VENDORS == 'true'
        run: |
          echo ">>> [Vendors Oracle] Changes in vendors/ detected."
          # TODO: Implement multi-vendor detection
          # Logic identical to Chips Oracle. Tags: vendor-espressif/v1.0.0
          echo "Vendors SemVer logic placeholder reached."
